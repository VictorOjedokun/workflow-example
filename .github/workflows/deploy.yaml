name: Build & Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH into VM →and Build & Run Docker
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          envs: REPO_URL
          script: |
            set -e   # stop immediately if any command fails

            echo "=== 1. Checking Docker ==="
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi
            echo "Docker: $(sudo docker --version)"

            echo "=== 2. Syncing code ==="
            APP_DIR="$HOME/my-docker-app"

            if [ -d "$APP_DIR/.git" ]; then
              echo "Repo exists — pulling latest..."
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              echo "Cloning repo..."
              git clone "https://github.com/$REPO_URL.git" "$APP_DIR"
              cd "$APP_DIR"
            fi

            echo "Files in app dir:"
            ls -la

            echo "=== 3. Building Docker image ==="
            cd "$APP_DIR"
            sudo docker build -t my-app .

            echo "=== 4. Replacing old container ==="
            sudo docker stop my-app-container 2>/dev/null || true
            sudo docker rm   my-app-container 2>/dev/null || true

            echo "=== 5. Starting new container ==="
            sudo docker run -d \
              --name my-app-container \
              --restart unless-stopped \
              -p 3000:3000 \
              my-app

            echo "=== Done! ==="
            sudo docker ps --filter name=my-app-container

        env:
          
          REPO_URL: ${{ github.repository }}